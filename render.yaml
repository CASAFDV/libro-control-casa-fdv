services:
  - type: web
    name: libro-control-casa-fdv
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: file:/app/data/custom.db
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: libro-control-data
      mountPath: /app/data
      sizeGB: 1
