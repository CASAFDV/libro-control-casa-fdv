services:
  - type: web
    name: libro-control-casa-fdv
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: file:/app/data/custom.db
      - key: JWT_SECRET
        value: libro-control-casa-fdv-secret-key-2026
      - key: PORT
        value: 3000
